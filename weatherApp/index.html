<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian's Weather App</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="shortcut icon" href="/img/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Noto+Sans+Mono:wght@100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav-bar">
        <a class="nav-bar-lnk" href="/">Home</a>
        <a class="nav-bar-lnk" href="/weatherApp">Weather</a>
    </nav>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="/videos/weatherAppBackground.mp4" type="video/mp4">
    </video>

    <h1 class="heading-black">Welcome to Julian's Weather App</h1>

    <div id="weather">
        <h1 id="curr-temp">temp</h1>
        <img id="curr-condition"></img>

        <button id="show-detailed">Show detailed</button>
        <br><br>
        <div id="detailed" class="hidden"></div>

        <div id="forecast"></div>
    </div>

    <footer>
        <a href="legal/legalNotice/">Imprint</a>
    </footer>

    <script src="main.js"></script>
</body>
</html>
